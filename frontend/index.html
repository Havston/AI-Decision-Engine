<!DOCTYPE html>
<html>
<head>
    <title>Smart City Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🏙 Smart City Dashboard</h1>

    <div class="chart">
        <p>📈 Загруженность дорог: 80%</p>
    </div>

    <div class="cards">
        <div class="card">
            <h2>🚗 Транспорт</h2>
            <p>Загруженность дорог</p>
        </div>

        <div class="card">
            <h2>🌫 Экология</h2>
            <p id="eco-level">Уровень: —</p>
            <div id="eco-indicator" class="indicator"></div>
        </div>
    </div>
    <select id="district">
        <option>Центр</option>
        <option>Алмалинский</option>
        <option>Ауэзовский</option>
        <option>Бостандыкский</option>
    </select>

    <div class="btn-container">
        <button class="analyze-btn" onclick="analyze()">Анализировать</button>
    </div>

    <div id="result" class="result hidden">
        <h3>📊 Результат анализа</h3>
        <p id="problem"></p>
        <p id="level"></p>
        <p id="recommendation"></p>
        <p id="summary"></p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
