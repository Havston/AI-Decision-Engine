<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart City Dashboard — Алматы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>

<div class="noise-overlay"></div>

<div class="dash">

  <!-- ШАПКА -->
  <header class="header">
    <div class="header-left">
      <div class="logo-wrap">
        <div class="logo-hex">🏙</div>
        <div class="logo-glow"></div>
      </div>
      <div class="header-title">
        <h1>Smart City</h1>
        <p class="subtitle">Акимат · Алматы</p>
      </div>
    </div>
    <div class="header-right">
      <div class="status-pill" id="statusPill">
        <span class="status-dot" id="statusDot"></span>
        <span class="update-time" id="updateTime">Загрузка...</span>
      </div>
      <button class="icon-btn" onclick="loadData()" title="Обновить">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      </button>
      <button class="icon-btn theme-toggle" onclick="toggleTheme()" title="Переключить тему" id="themeBtn">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- ПОГОДА -->
  <div class="weather-bar" id="weatherBar">
    <div class="weather-main">
      <span id="wTemp" class="w-temp">—</span>
      <span id="wDesc" class="w-desc">—</span>
    </div>
    <div class="weather-details">
      <div class="w-item"><span class="w-icon">💧</span><span id="wHumidity">—</span><span class="w-unit">%</span></div>
      <div class="w-item"><span class="w-icon">🌬</span><span id="wWind">—</span><span class="w-unit">м/с</span></div>
      <div class="w-item"><span class="w-icon">👁</span><span id="wVis">—</span><span class="w-unit">км</span></div>
    </div>
  </div>

  <!-- ТАБЫ -->
  <nav class="tabs" role="tablist">
    <button class="tab active" onclick="setSection('all', this)" role="tab">Все</button>
    <button class="tab" onclick="setSection('transport', this)" role="tab"><span class="tab-icon">🚗</span>Транспорт</button>
    <button class="tab" onclick="setSection('ecology', this)" role="tab"><span class="tab-icon">🌫</span>Экология</button>
    <button class="tab" onclick="setSection('safety', this)" role="tab"><span class="tab-icon">🛡</span>Безопасность</button>
    <button class="tab" onclick="setSection('zhkh', this)" role="tab"><span class="tab-icon">🔧</span>ЖКХ</button>
  </nav>

  <!-- KPI -->
  <div class="kpi-grid" id="kpiGrid">
    <div class="kpi-skeleton"></div>
    <div class="kpi-skeleton"></div>
    <div class="kpi-skeleton"></div>
    <div class="kpi-skeleton"></div>
  </div>

  <!-- ГРАФИКИ -->
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">Динамика за 24 часа</span>
        <div class="legend" id="lineLegend"></div>
      </div>
      <div class="chart-wrap">
        <canvas id="lineChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">Уровни проблем</span>
      </div>
      <div class="chart-wrap pie-wrap">
        <canvas id="pieChart"></canvas>
      </div>
      <div class="pie-stats" id="pieStats"></div>
    </div>
  </div>

  <!-- ПРОБЛЕМЫ -->
  <div class="section-card">
    <div class="section-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Проблемные ситуации
    </div>
    <div id="problemsList"></div>
  </div>

  <!-- ЧАТ -->
  <div class="section-card chat-card">
    <div class="section-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Алем — AI Ассистент Акимата
    </div>
    <div id="chatMessages" class="chat-messages">
      <div class="chat-msg ai">
        <div class="ai-avatar">А</div>
        <div class="msg-bubble">Здравствуйте! Я Алем, AI-ассистент Акимата Алматы. Я вижу актуальные данные города и готов ответить на ваши вопросы.</div>
      </div>
    </div>
    <div id="imagePreview" class="image-preview" style="display:none;">
      <img id="previewImg" class="preview-img" alt="preview">
      <button onclick="removeImage()" class="remove-img-btn" title="Удалить фото">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="chat-input-row">
      <label class="upload-btn" title="Прикрепить фото">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <input type="file" accept="image/*" onchange="handleImageUpload(event)" style="display:none">
      </label>
      <input type="text" id="chatInput" class="chat-input"
        placeholder="Задайте вопрос про Алматы..."
        onkeydown="if(event.key==='Enter') sendChat()">
      <button class="send-btn" onclick="sendChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <p class="chat-hint">Ctrl+V — вставить скриншот</p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
